name: Refresh FX Signals

on:
  schedule:
    # 5 分間隔 (GitHub Actions cron の最短指定)。
    # 実測のジッタにより 5〜15 分の幅で発火するが、ベストエフォートで頻度を上げる。
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # 手動実行可
  push:
    branches: [main]
    paths:
      - "scripts/build_static.py"
      - ".github/workflows/refresh-signals.yml"

# 1 本だけ走るように直列化
concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット push のため
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static signals + send alerts
        env:
          LINE_TOKEN:          ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:        ${{ secrets.LINE_USER_ID }}
          WHATSAPP_PHONE:      ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:     ${{ secrets.WHATSAPP_APIKEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 口座残高 (JPY) を Repository Variables に設定すると、アラートに
          # 「残高×RISK_PERCENT% リスク」の推奨ロットが表示される
          ACCOUNT_BALANCE_JPY: ${{ vars.ACCOUNT_BALANCE_JPY || '' }}
          RISK_PERCENT:        ${{ vars.RISK_PERCENT || '1.0' }}
        run: python scripts/build_static.py

      - name: Commit updated JSON
        run: |
          git config user.name  "fx-bot"
          git config user.email "fx-bot@users.noreply.github.com"
          # paper_positions/history も永続化 (無いとペーパートレードが毎回リセットされ検証データが消える)
          git add frontend/public/api state/seen_alerts.json state/paper_positions.json state/paper_history.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh signals $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      # --- 自己再起動 (Self-trigger) ---
      # GitHub Actions の schedule cron は free tier で大幅に deprioritize される
      # (実測: */15 でも 1.5-4h 間隔)。回避策として、各実行の終わりに 4.5 分
      # スリープしてから workflow_dispatch で自分自身を再起動する。
      # これで実効 5 分間隔の循環が成立する。
      #
      # 必要な GitHub Secret: WORKFLOW_DISPATCH_TOKEN
      #   workflow + repo スコープを持つ Personal Access Token
      #   未設定の場合はチェーンしない (schedule cron だけが動く)
      #
      # 重要: developer の push 時はチェーンを開始しない (無限ループ回避)
      - name: Schedule next run (~5 min later)
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "WORKFLOW_DISPATCH_TOKEN 未設定。schedule cron のみで運用 (1.5-4h 間隔)。"
            echo "5 分間隔にするには PAT を発行して Secrets に追加してください。"
            exit 0
          fi
          echo "Sleeping ~4m 30s before re-dispatching..."
          sleep 270
          gh workflow run refresh-signals.yml --ref main
          echo "Re-dispatched. Next run starts now."
