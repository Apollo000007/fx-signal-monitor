name: Refresh FX Signals

on:
  schedule:
    # 15 分間隔 (GitHub Actions 最短)。UTC ベース。
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # 手動実行可
  push:
    branches: [main]
    paths:
      - "scripts/build_static.py"
      - ".github/workflows/refresh-signals.yml"

# 1 本だけ走るように直列化
concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット push のため
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static signals + send alerts
        env:
          LINE_TOKEN:          ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID:        ${{ secrets.LINE_USER_ID }}
          WHATSAPP_PHONE:      ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:     ${{ secrets.WHATSAPP_APIKEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/build_static.py

      - name: Commit updated JSON
        run: |
          git config user.name  "fx-bot"
          git config user.email "fx-bot@users.noreply.github.com"
          git add frontend/public/api state/seen_alerts.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh signals $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
